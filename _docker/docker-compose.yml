services:
  app:
    build:
      context: ..
      dockerfile: _docker/Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    environment:
      RUN_MIGRATIONS: "false"
    depends_on:
      - database
    volumes:
      - ..:/var/www/html
    entrypoint: [ "/var/www/html/_docker/entrypoint.sh" ]
    networks:
      - lan

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ..:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - lan

  database:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lan

networks:
  lan:
    driver: bridge

volumes:
  pgdata:
    driver: local
